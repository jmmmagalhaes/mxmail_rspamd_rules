MXMAILPT_spammy_tld_env_from {
    type = "from";
    filter = "email:domain:tld";
    map = "https://raw.githubusercontent.com/jmmmagalhaes/mxmail_rspamd_rules/master/lists/mxmailpt-tlds.txt";
    symbol = "SPAMMY_TLD_ENVFROM";
    description = "Sending TLD likely spam";
    score = 2;
    regexp = true;
}

MXMAILPT_spammy_tld_from {
    type = "header";
    header = "from";
    filter = "email:domain:tld";
    map = "https://raw.githubusercontent.com/jmmmagalhaes/mxmail_rspamd_rules/master/lists/mxmailpt-tlds.txt";
    symbol = "SPAMMY_TLD_FROM";
    require_symbols = "!SPAMMY_TLD_ENVFROM";
    description = "Sending TLD likely spam";
    score = 2;
    regexp = true;
}

MXMAILPT_BODY_SPAM {
    type = "content";
    filter = "text";
    map = "https://raw.githubusercontent.com/jmmmagalhaes/mxmail_rspamd_rules/master/lists/mxmailpt-body-spam.map";
    symbol = "MXMAILPT_BODY_SPAM";
    prefilter = true;
    score = 8.0;
    regexp = true;
    message = "The text of this email contained a string that we identified to be spam.";
}

MXMAILPT_SPAMMY_SUBJECT {
    type = "header";
    header = "subject";
    map = "https://raw.githubusercontent.com/jmmmagalhaes/mxmail_rspamd_rules/master/lists/mxmailpt-subject-spam.map";
    symbol = "SPAMMY_SUBJ";
    prefilter = true;
    score = 9.0;
    regexp = true;
}

MXMAILPT_SENDER_FROM_BLACKLIST {
    type = "from";
    map = "https://raw.githubusercontent.com/jmmmagalhaes/mxmail_rspamd_rules/master/lists/mxmailpt-blacklisted-sender-strings.map";
    regexp = true;
    description = "Blacklisted sender";
    prefilter = true;
    filter = "email:addr"
    score = 12.0;
    message = "This sender has been blocked for matching a known spam trend";
}

MXMAILPT_DENY_SENDER_DOMAIN {
    type = "from";
    filter = "email:domain";
    map = "https://raw.githubusercontent.com/jmmmagalhaes/mxmail_rspamd_rules/master/lists/mxmailpt-deny-sender-domain.map";
    description = "domain deny list";
    score = 12.0;
}

MXMAILPT_WHITELIST_SENDER_DOMAIN {
    type = "from";
    filter = "email:domain";
    map = "https://raw.githubusercontent.com/jmmmagalhaes/mxmail_rspamd_rules/master/lists/mxmail-whitelist-domain.map";
    description = "domain allow list";
    score = -1.0;
}

MXMAILPT_DENY_SENDER_EMAIL {
    type = "from";
    filter = "email";
    map = "https://raw.githubusercontent.com/jmmmagalhaes/mxmail_rspamd_rules/master/lists/mxmailpt-deny-sender-email.map";
    prefilter = true;
    description = "email deny list";
    score = 12.0;
}

MXMAILPT_WHITELIST_SENDER_EMAIL {
    type = "from";
    filter = "email";
    map = "https://raw.githubusercontent.com/jmmmagalhaes/mxmail_rspamd_rules/master/lists/mxmail-whitelist-email.map";
    description = "email allow list";
    score = -1.0;
}

MXMAILPT_IP_WHITELIST {
    type = "ip";
    prefilter = true;
    map = "https://raw.githubusercontent.com/jmmmagalhaes/mxmail_rspamd_rules/master/lists/mxmail-ip-whitelist.map";
    action = "accept";
}

MXMAILPT_IP_BLACKLIST {
    type = "ip";
    prefilter = true;
    map = "https://raw.githubusercontent.com/jmmmagalhaes/mxmail_rspamd_rules/master/lists/mxmail-ip-blacklist.map";
    score = 12.0;
}

ahbl_spamsigns_body {
        type = "content";
        filter = "oneline";
        map = "https://downloads.ahbl.org/rspamd/ahbl-spamsigns-body.map.zst";
        regexp = true;
        symbol = "AHBL_SPAMSIGNS_BODY";
        score 5.0;
        description = "AHBL: Spam signs in body";
}

ahbl_spamsigns_cs {
        type = "content";
        filter = "oneline";
        map = "https://downloads.ahbl.org/rspamd/ahbl-spamsigns-contactsocial.map.zst";
        regexp = true;
        symbol = "AHBL_SPAMSIGNS_CS";
        score 3.0;
        description = "AHBL: Contact / social spam signs in body";
}

ahbl_badrep_domains_url {
        type = "url";
        map = "https://downloads.ahbl.org/rspamd/ahbl-badrep-domains.map.zst";
        regexp = false;
        symbol = "AHBL_BADREP_DOMAINS_URL";
        score 3.0;
        description = "AHBL: Bad reputation / spam domains in URLs";
}

ahbl_spamsigns_subject {
        type = "header";
        header = "Subject";
        map = "https://downloads.ahbl.org/rspamd/ahbl-spamsigns-subject.map.zst";
        regexp = true;
        symbol = "AHBL_SPAMSIGNS_SUBJECT";
        score 3.0;
        description = "AHBL: Spam signs in subject";
}

ahbl_spam_email_from {
        type = "from";
        map = "https://downloads.ahbl.org/rspamd/ahbl-spam-email-addy.map.zst";
        symbol = "AHBL_SPAMEMAIL_FROM";
        score 5.0;
        description = "AHBL: Spam email address in From:";
}

BAZAR_ABUSE_CH {
        type = "selector";
        selector = "attachments(hex,md5)";
        map = "https://bazaar.abuse.ch/export/txt/md5/recent/";
        score = 10.0;
}
